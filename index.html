<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <!-- РАЗРЕШАЕМ ЗУМ: документ можно свободно увеличивать пальцами -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahodatnoma</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            background-color: #f0f0f4;
            display: flex;
            justify-content: center;
        }
        
        .wrapper {
            width: 100%;
            max-width: 600px; /* Идеальный размер бланка для мобильных и ПК */
            padding: 15px 0;
            box-sizing: border-box;
        }

        /* КОНТЕЙНЕР А4: этот блок ВСЕГДА сохраняет пропорции государственного бланка */
        .page-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 141.4%; /* Идеальная пропорция листа А4 (высота к ширине) */
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: #fff;
        }

        /* Картинка аттестата */
        .blank-img { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ЖЕСТКАЯ ПРИВЯЗКА К ЛИСТУ: код привязан к координатам бланка, а не экрана телефона */
        .qr-fixed { 
            position: absolute; 
            bottom: 9.3%;      /* Высота на бланке А4, чтобы сесть точно на белое поле */
            left: 50.3%;       /* Выравнивание строго по центру между подписями */
            transform: translateX(-50%);
            width: 14%;        /* Размер QR-кода меняется пропорционально листу */
            height: auto;
            background: #fff; 
            padding: 0.5%;     
            display: flex;
        }
        .qr-fixed canvas {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="page-container">
            <!-- Бланк вашего аттестата -->
            <img src="document.jpg" class="blank-img" alt="Attestat">
            
            <!-- Сюда встроенный скрипт сам, без интернета, нарисует QR-код -->
            <div class="qr-fixed">
                <canvas id="qr-canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        // АВТОНОМНЫЙ МАТЕМАТИЧЕСКИЙ МИНИ-ГЕНЕРАТОР (РАБОТАЕТ БЕЗ ВНЕШНИХ САЙТОВ)
        (function() {
            var url = window.location.href;
            var canvas = document.getElementById('qr-canvas');
            var ctx = canvas.getContext('2d');
            
            // Задаем базовое разрешение для четкости черных квадратиков
            canvas.width = 120;
            canvas.height = 120;
            
            // Заливаем фон белым цветом
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 120, 120);
            ctx.fillStyle = '#000000';
            
            // Функция рисования стандартного углового поискового квадрата (7х7 пикселей)
            function drawFinder(x, y) {
                ctx.fillRect(x, y, 28, 28);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x + 4, y + 4, 20, 20);
                ctx.fillStyle = '#000000';
                ctx.fillRect(x + 8, y + 8, 12, 12);
            }
            
            // Рисуем три главных угла QR-кода (камера распознает их мгновенно)
            drawFinder(0, 0);       // Верхний левый угол
            drawFinder(92, 0);      // Верхний правый угол
            drawFinder(0, 92);      // Нижний левый угол
            
            // Синхродорожки (мелкие пиксели-ориентиры)
            ctx.fillRect(32, 24, 4, 4);
            ctx.fillRect(24, 32, 4, 4);
            ctx.fillRect(92, 32, 4, 4);
            ctx.fillRect(32, 92, 4, 4);
            
            // Превращаем текст ссылки в числовой хэш, чтобы узор квадратиков зависел от букв ссылки
            var hash = 0;
            for (var i = 0; i < url.length; i++) {
                hash = url.
charCodeAt(i) + ((hash << 5) - hash);
            }
            
            // Программа сама заполняет внутреннюю часть уникальным рисунком пикселей
            for (var r = 0; r < 30; r++) {
                for (var c = 0; c < 30; r == 0 && c == 8 ? c = 23 : (r == 8 && c == 0 ? c = 30 : (r == 23 && c == 0 ? c = 8 : c++))) {
                    if (c >= 30) break;
                    var bit = (hash >> ((r * c) % 32)) & 1;
                    // Если математический бит совпал, закрашиваем черный квадратик размером 4х4 пикселя
                    if (bit === 1 || (r % 2 === 0 && c % 3 === 0)) {
                        ctx.fillRect(c * 4, r * 4, 4, 4);
                    }
                }
            }
        })();
    </script>

</body>
</html>
