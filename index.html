<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Официальный документ с авто-QR</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f0f4; text-align: center; }
        .download-bar { background: #ffffff; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-download { display: inline-block; padding: 10px 20px; color: white; background: #007bff; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .document-container { position: relative; max-width: 800px; margin: 20px auto; height: 85vh; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .pdf-viewer { width: 100%; height: 100%; border: none; }
        .auto-qr-code { position: absolute; bottom: 40px; right: 40px; background: white; padding: 8px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="download-bar">
        <!-- Ссылка на ваш загруженный PDF -->
        <a href="document.pdf" download="document.pdf" class="btn-download">⬇️ Скачать оригинал PDF</a>
    </div>

    <div class="document-container">
        <!-- Отображаем ваш PDF -->
        <iframe src="document.pdf" class="pdf-viewer"></iframe>
        
        <!-- Сюда робот сам приклеит QR-код -->
        <div class="auto-qr-code">
            <img id="dynamic-qr" src="" alt="Автоматический QR-код" width="110" height="110">
        </div>
    </div>

    <script>
        // Робот берет ссылку на ваш НОВЫЙ сайт, превращает в QR через qrserver и клеит в угол бланка
        var currentUrl = window.location.href;
        var qrImage = document.getElementById('dynamic-qr');
        qrImage.src = 'https://qrserver.com' + encodeURIComponent(currentUrl);
    </script>

</body>
</html>
