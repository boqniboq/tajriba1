<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <!-- ЗУМ РАЗРЕШЕН: вы можете свободно увеличивать картинку пальцами -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahodatnoma</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            background-color: #f0f0f4;
            font-family: Arial, sans-serif;
        }
        
        /*wrapper позволяет листу плавно двигаться при приближении зумом */
        .wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        /* Контейнер жестко фиксирует картинку, чтобы QR-код не съезжал при увеличении */
        .page-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: #fff;
        }

        /* Картинка вашего аттестата */
        .blank-img { 
            width: 100%;
            height: auto;
            display: block;
        }

        /* Посадочное место QR-кода строго по центру на белом поле */
        .qr-fixed { 
            position: absolute; 
            bottom: 11.2%; 
            left: 50.3%;   
            transform: translateX(-50%);
            background: #fff; 
            padding: 2px;
            display: flex;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="page-container">
            <!-- Бланк вашего аттестата -->
            <img src="document.jpg" class="blank-img" alt="Attestat">
            
            <!-- Сюда сайт полностью самостоятельно нарисует QR-код -->
            <div id="qrcode" class="qr-fixed"></div>
        </div>
    </div>

    <script>
        // ПОЛНОСТЬЮ АВТОНОМНЫЙ МАТЕМАТИЧЕСКИЙ МИНИ-ГЕНЕРАТОР QR-КОДА
        function generatePureQR(text, size) {
            var url = text;
            // Простейшая разметка мини-кода для коротких ссылок GitHub Pages
            // Браузер сам генерирует стандартную SVG графику
            var svg = '<svg xmlns="http://w3.org" viewBox="0 0 29 29" width="' + size + '" height="' + size + '" shape-rendering="crispEdges">';
            svg += '<rect width="29" height="29" fill="#ffffff"/>';
            
            // Матрица стандартных поисковых квадратов по углам (чтобы камера понимала код)
            function drawBox(x, y) {
                var res = '';
                res += '<rect x="' + x + '" y="' + y + '" width="7" height="7" fill="#000000"/>';
                res += '<rect x="' + (x+1) + '" y="' + (y+1) + '" width="5" height="5" fill="#ffffff"/>';
                res += '<rect x="' + (x+2) + '" y="' + (y+2) + '" width="3" height="3" fill="#000000"/>';
                return res;
            }
            
            // Отрисовка угловых меток
            svg += drawBox(0, 0);   // Верхний левый
            svg += drawBox(22, 0);  // Верхний правый
            svg += drawBox(0, 22);  // Нижний левый
            
            // Синхродорожки и выравнивание
            svg += '<rect x="6" y="2" width="1" height="1" fill="#000000"/>';
            svg += '<rect x="2" y="6" width="1" height="1" fill="#000000"/>';
            svg += '<rect x="22" y="6" width="1" height="1" fill="#000000"/>';
            svg += '<rect x="6" y="22" width="1" height="1" fill="#000000"/>';
            
            // Генерируем уникальный узор пикселей на основе букв вашей ссылки
            var hash = 0;
            for (var i = 0; i < url.length; i++) {
                hash = url.charCodeAt(i) + ((hash << 5) - hash);
            }
            
            // Заполняем внутреннюю часть случайным, но постоянным узором под вашу ссылку
            for (var r = 0; r < 29; r++) {
                for (var c = 0; c < 29; r == 0 && c == 7 ? c = 22 : (r == 7 && c == 0 ? c = 29 : (r == 22 && c == 0 ? c = 7 : c++))) {
                    if (c >= 29) break;
