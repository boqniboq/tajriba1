<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <!-- РАЗРЕШАЕМ ПРИБЛИЖЕНИЕ: убрали запрет на зум, теперь можно приближать пальцами -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahodatnoma</title>
    <!-- Подключаем надежную библиотеку для генерации QR прямо в браузере -->
    <script src="https://cloudflare.com"></script>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            background-color: #f0f0f4;
            font-family: Arial, sans-serif;
        }
        
        /* Разрешаем странице прокручиваться, когда документ увеличен */
        .wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        /* Контейнер бланка: держит четкие пропорции, чтобы QR-код не съезжал при зуме */
        .page-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Идеальная ширина для мобильных и ПК */
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: #fff;
        }

        /* Аттестат-картинка занимает всю ширину контейнера */
        .blank-img { 
            width: 100%;
            height: auto;
            display: block;
        }

        /* QR-код намертво прилипает к координатам картинки. При зуме он будет увеличиваться вместе с ней! */
        .qr-fixed { 
            position: absolute; 
            bottom: 11.2%; 
            left: 50.3%;   
            transform: translateX(-50%);
            background: #fff; 
            padding: 2px;
            display: flex;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="page-container">
            <!-- Бланк аттестата -->
            <img src="document.jpg" class="blank-img" alt="Attestat">
            
            <!-- Место, куда автономно встроится QR-код -->
            <div id="qrcode" class="qr-fixed"></div>
        </div>
    </div>

    <script>
        // Скрипт мгновенно генерирует QR-код на основе текущей ссылки
        var currentUrl = window.location.href;
        
        new QRCode(document.getElementById("qrcode"), {
            text: currentUrl,
            width: 85,
            height: 85,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>

</body>
</html>
