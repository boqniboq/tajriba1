<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shahodatnoma</title>
    <style>
        /* Полностью убираем прокрутку, отступы и лишние элементы */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #fff;
        }

        /* Контейнер, который подстраивается под экран и держит пропорции бланка */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ваш PDF-аттестат открывается на весь экран без возможности ручного масштабирования */
        .pdf-view { 
            width: 100%; 
            height: 100%; 
            border: none;
            display: block;
        }

        /* QR-код намертво прикреплен строго по центру в нижней части бланка между подписями */
        .qr-fixed { 
            position: absolute; 
            bottom: 11.2%; /* Идеальная высота, чтобы встать ровно между Директором и Датой */
            left: 50.5%;   /* Центровка с микро-смещением для идеального попадания в пустое поле */
            transform: translateX(-50%);
            background: #fff; 
            padding: 1px;
            display: flex;
            pointer-events: none; /* Защита: код нельзя случайно сдвинуть пальцем */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Чистый PDF-документ -->
        <iframe src="document.pdf" class="pdf-view"></iframe>
        
        <!-- Автоматический QR-код, который прилипает намертво -->
        <div class="qr-fixed">
            <img id="dynamic-qr" src="" alt="QR" width="85" height="85">
        </div>
    </div>

    <script>
        // Робот определяет точную ссылку на ваш сайт в интернете
        var currentUrl = window.location.href;
        
        // Автоматически генерируем QR-код под эту ссылку через фабрику qrserver
        var qrImage = document.getElementById('dynamic-qr');
        qrImage.src = 'https://qrserver.com' + encodeURIComponent(currentUrl);
    </script>

</body>
</html>
