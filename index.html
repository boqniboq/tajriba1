<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <!-- ЗУМ РАЗРЕШЕН: пользователь может свободно увеличивать и уменьшать документ пальцами -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahodatnoma</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            background-color: #f0f0f4;
            font-family: Arial, sans-serif;
        }
        
        /*wrapper позволяет листу плавно двигаться при приближении зумом */
        .wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        /* Контейнер жестко фиксирует картинку, чтобы QR-код не съезжал при увеличении */
        .page-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Идеальный размер для дисплеев телефонов и ПК */
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: #fff;
        }

        /* Картинка аттестата */
        .blank-img { 
            width: 100%;
            height: auto;
            display: block;
        }

        /* Посадочное место QR-кода строго по центру на белом поле */
        .qr-fixed { 
            position: absolute; 
            bottom: 11.2%; 
            left: 50.3%;   
            transform: translateX(-50%);
            background: #fff; 
            padding: 2px;
            display: flex;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="page-container">
            <!-- Бланк вашего аттестата -->
            <img src="document.jpg" class="blank-img" alt="Attestat">
            
            <!-- Сюда робот приклеит новый QR-код -->
            <div class="qr-fixed">
                <img id="dynamic-qr" src="" alt="QR-код" width="85" height="85">
            </div>
        </div>
    </div>

    <script>
        // Робот определяет точную ссылку вашего рабочего сайта в интернете
        var currentUrl = window.location.href;
        
        // Подключаем передовой и открытый генератор QuickChart (работает без сбоев на ПК и телефонах)
        var qrImage = document.getElementById('dynamic-qr');
        qrImage.src = 'https://quickchart.io' + encodeURIComponent(currentUrl);
    </script>

</body>
</html>
