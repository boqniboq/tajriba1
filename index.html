<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <!-- ЗУМ РАЗРЕШЕН: документ можно свободно увеличивать пальцами -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahodatnoma</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            background-color: #f0f0f4;
            display: flex;
            justify-content: center;
        }
        
        .wrapper {
            width: 100%;
            max-width: 600px; /* Ограничение ширины листа на ПК */
            padding: 15px 0;
            box-sizing: border-box;
        }

        /* КОНТЕЙНЕР А4: этот блок ВСЕГДА сохраняет пропорции государственного бланка */
        .page-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 141.4%; /* Магическое число: идеальная пропорция листа А4 (высота к ширине) */
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: #fff;
        }

        /* Картинка аттестата намертво растягивается внутри контейнера А4 */
        .blank-img { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ЖЕСТКАЯ ПРИВЯЗКА К ЛИСТУ: код привязан к процентам самого бланка, а не экрана телефона */
        .qr-fixed { 
            position: absolute; 
            bottom: 9.3%;      /* Точнейшая высота на бланке А4, чтобы сесть на белое поле */
            left: 50.3%;       /* Выравнивание строго по центру между текстом */
            transform: translateX(-50%);
            width: 14%;        /* Размер QR-кода теперь тоже зависит от размера листа */
            height: auto;
            background: #fff; 
            padding: 0.5%;     /* Микроскопическая белая рамка */
            display: flex;
        }
        .qr-fixed img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="page-container">
            <!-- Бланк вашего аттестата -->
            <img src="document.jpg" class="blank-img" alt="Attestat">
            
            <!-- Посадочное место для QR-кода -->
            <div class="qr-fixed">
                <img id="dynamic-qr" src="" alt="QR">
            </div>
        </div>
    </div>

    <script>
        // Робот определяет ссылку вашего рабочего сайта boqibooq.github.io/tajriba1/
        var currentUrl = window.location.href;
        
        // Подключаем стабильный открытый генератор QuickChart
        var qrImage = document.getElementById('dynamic-qr');
        qrImage.src = 'https://quickchart.io' + encodeURIComponent(currentUrl);
    </script>

</body>
</html>
