<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shahodatnoma</title>
    <style>
        /* Полностью блокируем любые сдвиги, прокрутки и масштабирование */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Контейнер, который намертво держит картинку по центру экрана */
        .page-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px; /* Ограничение ширины для компьютеров */
            max-height: 850px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Аттестат как картинка: сам сжимается под экран телефона и не двигается */
        .blank-img { 
            width: 100%;
            height: 100%;
            object-fit: contain; /* Картинка идеально впишется в экран без обрезки */
            pointer-events: none;
        }

        /* Альтернативный автоматический QR-код на Dub.co API */
        .qr-fixed { 
            position: absolute; 
            bottom: 11.2%; /* Идеальная высота над нижним краем бланка */
            left: 50.3%;   /* Выравнивание точно по центру белого поля */
            transform: translateX(-50%);
            background: #fff; 
            padding: 1px;
            display: flex;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- Бланк аттестата в виде адаптивной картинки -->
        <img src="document.jpg" class="blank-img" alt="Attestat">
        
        <!-- Новый авто-генератор QR-кодов от Dub.co -->
        <div class="qr-fixed">
            <img id="dynamic-qr" src="" alt="QR" width="82" height="82">
        </div>
    </div>

    <script>
        // Скрипт определяет ссылку на ваш сайт в интернете
        var currentUrl = window.location.href;
        
        // Подключаем альтернативный стабильный генератор Dub.co API
        var qrImage = document.getElementById('dynamic-qr');
        qrImage.src = 'https://dub.co' + encodeURIComponent(currentUrl);
    </script>

</body>
</html>
